<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEAMSOFT Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --dark: #111111;
    --card: #161616;
    --card2: #1c1c1c;
    --card3: #222;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.14);
    --white: #ffffff;
    --muted: rgba(255,255,255,0.55);
    --muted2: rgba(255,255,255,0.35);
    --r: #ff3b5c;
    --o: #ff8c00;
    --y: #ffd700;
    --g: #39d353;
    --b: #00b4ff;
    --v: #a855f7;
    --rainbow: linear-gradient(90deg, #ff3b5c, #ff8c00, #ffd700, #39d353, #00b4ff, #a855f7, #ff3b5c);
    --rainbow2: linear-gradient(135deg, #ff3b5c 0%, #ff8c00 20%, #ffd700 40%, #39d353 60%, #00b4ff 80%, #a855f7 100%);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--black);
    color: var(--white);
    font-size: 15px;
    line-height: 1.6;
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

  @keyframes shift { 0%{background-position:0%} 100%{background-position:200%} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes blink { 0%,80%,100%{opacity:0.3} 40%{opacity:1} }
  @keyframes pulse-ring { 0%{transform:scale(1);opacity:0.6} 100%{transform:scale(1.6);opacity:0} }
  @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }

  .rainbow-text {
    background: var(--rainbow);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shift 4s linear infinite;
  }

  /* ─── APP LAYOUT ─── */
  .app {
    display: grid;
    grid-template-columns: 280px 1fr;
    height: 100vh;
    background: var(--black);
  }
  .app.collapsed { grid-template-columns: 64px 1fr; }

  /* ─── SIDEBAR ─── */
  .sidebar {
    background: #0c0c0c;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .sidebar-top {
    padding: 16px 14px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    min-height: 64px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    flex-shrink: 0;
  }
  .logo-box {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: var(--dark);
    position: relative;
    flex-shrink: 0;
  }
  .logo-box::before {
    content: '';
    position: absolute;
    inset: -1.5px;
    background: var(--rainbow);
    background-size: 200%;
    animation: shift 3s linear infinite;
    border-radius: 9px;
    z-index: 0;
  }
  .logo-box span {
    position: absolute;
    inset: 1.5px;
    background: var(--black);
    border-radius: 6.5px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
  }
  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2.5px;
    background: var(--rainbow);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shift 4s linear infinite;
    white-space: nowrap;
  }
  .sidebar-toggle {
    margin-left: auto;
    width: 30px;
    height: 30px;
    border-radius: 7px;
    background: transparent;
    border: 1px solid transparent;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
    flex-shrink: 0;
  }
  .sidebar-toggle:hover { background: rgba(255,255,255,0.05); color: #fff; }
  .sidebar-toggle svg { width: 16px; height: 16px; }

  .new-chat-wrap { padding: 14px; }
  .new-chat-btn {
    width: 100%;
    padding: 11px 14px;
    border-radius: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    font-family: 'Barlow', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all .15s;
    position: relative;
    overflow: hidden;
  }
  .new-chat-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--rainbow2);
    opacity: 0;
    transition: opacity .2s;
  }
  .new-chat-btn:hover::before { opacity: 0.15; }
  .new-chat-btn:hover { border-color: rgba(255,255,255,0.2); }
  .new-chat-btn svg { width: 16px; height: 16px; flex-shrink: 0; position: relative; z-index: 1; }
  .new-chat-btn span { position: relative; z-index: 1; }

  .sidebar-search {
    padding: 0 14px 12px;
  }
  .search-input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px 9px 34px;
    color: #fff;
    font-size: 13px;
    font-family: 'Barlow', sans-serif;
    outline: none;
    transition: border-color .15s;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke='rgba(255,255,255,0.4)' stroke-width='2'><circle cx='11' cy='11' r='7'/><path stroke-linecap='round' d='M21 21l-4.3-4.3'/></svg>");
    background-repeat: no-repeat;
    background-position: 10px center;
    background-size: 14px;
  }
  .search-input:focus { border-color: rgba(0,180,255,0.5); background-color: rgba(0,180,255,0.04); }

  .chat-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 10px 12px;
  }
  .chat-group-label {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted2);
    padding: 14px 8px 8px;
  }
  .chat-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 8px;
    cursor: pointer;
    color: rgba(255,255,255,0.75);
    font-size: 13.5px;
    transition: background .15s;
    position: relative;
    overflow: hidden;
    text-decoration: none;
  }
  .chat-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
  .chat-item.active { background: rgba(0,180,255,0.08); color: #fff; }
  .chat-item.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 6px;
    bottom: 6px;
    width: 2px;
    background: var(--rainbow);
    background-size: 200%;
    animation: shift 4s linear infinite;
    border-radius: 0 2px 2px 0;
  }
  .chat-item-title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .chat-item-menu {
    opacity: 0;
    width: 22px;
    height: 22px;
    border-radius: 5px;
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
    flex-shrink: 0;
  }
  .chat-item:hover .chat-item-menu { opacity: 1; }
  .chat-item-menu:hover { background: rgba(255,255,255,0.1); color: #fff; }

  .sidebar-bottom {
    border-top: 1px solid var(--border);
    padding: 12px;
  }
  .user-box {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 10px;
    cursor: pointer;
    transition: background .15s;
  }
  .user-box:hover { background: rgba(255,255,255,0.05); }
  .user-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--rainbow2);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #000;
    font-weight: 700;
    font-size: 12px;
    flex-shrink: 0;
  }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-plan { font-size: 11px; color: var(--muted); }
  .user-info-icon { color: var(--muted); }
  .user-info-icon svg { width: 14px; height: 14px; }

  /* Collapsed sidebar */
  .app.collapsed .logo-text,
  .app.collapsed .new-chat-btn span,
  .app.collapsed .sidebar-search,
  .app.collapsed .chat-list,
  .app.collapsed .user-info,
  .app.collapsed .user-info-icon { display: none; }
  .app.collapsed .new-chat-btn { justify-content: center; padding: 11px 0; }
  .app.collapsed .sidebar-top { padding: 16px 12px 12px; justify-content: center; }
  .app.collapsed .sidebar-top .logo { width: 0; overflow: hidden; opacity: 0; }
  .app.collapsed .sidebar-toggle { margin-left: 0; }
  .app.collapsed .new-chat-wrap { padding: 14px 10px; }
  .app.collapsed .sidebar-bottom { padding: 12px 8px; }
  .app.collapsed .user-box { padding: 4px; justify-content: center; }

  /* ─── MAIN ─── */
  .main {
    display: flex;
    flex-direction: column;
    background: var(--black);
    position: relative;
    overflow: hidden;
  }
  .main-bg {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 50% at 70% 20%, rgba(0,180,255,0.05) 0%, transparent 70%),
                radial-gradient(ellipse 50% 50% at 20% 90%, rgba(168,85,247,0.05) 0%, transparent 70%);
    pointer-events: none;
  }
  .topbar {
    height: 64px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 14px;
    background: rgba(10,10,10,0.7);
    backdrop-filter: blur(12px);
    position: relative;
    z-index: 2;
  }
  .model-selector {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    border-radius: 8px;
    background: var(--card);
    border: 1px solid var(--border);
    color: #fff;
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
    font-family: 'Barlow', sans-serif;
  }
  .model-selector:hover { border-color: rgba(255,255,255,0.2); background: var(--card2); }
  .model-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--rainbow);
    background-size: 200%;
    animation: shift 4s linear infinite;
  }
  .model-selector svg { width: 12px; height: 12px; color: var(--muted); }

  .topbar-spacer { flex: 1; }
  .topbar-btn {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: transparent;
    border: 1px solid transparent;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
  }
  .topbar-btn:hover { background: rgba(255,255,255,0.05); color: #fff; }
  .topbar-btn svg { width: 17px; height: 17px; }
  .topbar-share {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
    font-family: 'Barlow', sans-serif;
  }
  .topbar-share:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.04); }
  .topbar-share svg { width: 14px; height: 14px; }

  /* ─── CHAT AREA ─── */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    position: relative;
    z-index: 1;
  }
  .chat-inner {
    max-width: 780px;
    margin: 0 auto;
    padding: 32px 24px 24px;
  }

  /* Welcome / Empty state */
  .welcome {
    min-height: calc(100vh - 64px - 200px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px;
    animation: fadeUp .4s ease both;
  }
  .welcome-icon {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
    position: relative;
  }
  .welcome-icon::before {
    content: '';
    position: absolute;
    inset: -1.5px;
    border-radius: 17px;
    background: var(--rainbow);
    background-size: 200%;
    animation: shift 4s linear infinite;
    z-index: -1;
  }
  .welcome-icon span { font-size: 30px; }
  .welcome h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 44px;
    letter-spacing: 1.5px;
    line-height: 1;
    margin-bottom: 12px;
  }
  .welcome p {
    color: var(--muted);
    font-size: 16px;
    max-width: 460px;
    margin-bottom: 36px;
    font-weight: 300;
  }
  .suggestions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
    max-width: 620px;
  }
  .suggestion {
    text-align: left;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all .15s;
    font-family: 'Barlow', sans-serif;
    color: #fff;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .suggestion:hover { border-color: rgba(0,180,255,0.3); background: var(--card2); transform: translateY(-1px); }
  .suggestion-icon {
    width: 30px;
    height: 30px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .suggestion-text { flex: 1; }
  .suggestion-title { font-size: 13.5px; font-weight: 600; margin-bottom: 3px; line-height: 1.3; }
  .suggestion-sub { font-size: 12px; color: var(--muted); line-height: 1.4; }

  /* ─── MESSAGES ─── */
  .messages { display: flex; flex-direction: column; gap: 26px; }
  .msg {
    display: flex;
    gap: 14px;
    animation: fadeUp .3s ease both;
  }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 12px;
    margin-top: 2px;
  }
  .msg.user .msg-avatar {
    background: var(--rainbow2);
    color: #000;
  }
  .msg.assistant .msg-avatar {
    background: var(--card);
    border: 1px solid var(--border);
    position: relative;
  }
  .msg.assistant .msg-avatar::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 50%;
    background: var(--rainbow);
    background-size: 200%;
    animation: shift 4s linear infinite;
    z-index: -1;
  }
  .msg.assistant .msg-avatar span {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 0.5px;
    background: var(--rainbow);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shift 4s linear infinite;
  }
  .msg-body {
    max-width: calc(100% - 50px);
  }
  .msg-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: 0.3px;
  }
  .msg.user .msg-name { text-align: right; }
  .msg-bubble {
    font-size: 15px;
    line-height: 1.65;
    color: rgba(255,255,255,0.92);
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg.user .msg-bubble {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 12px 16px;
    border-radius: 14px 14px 4px 14px;
    display: inline-block;
  }
  .msg.assistant .msg-bubble {
    padding-top: 2px;
  }
  .msg-bubble code {
    background: rgba(255,255,255,0.08);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }
  .msg-bubble pre {
    background: #0a0a0a;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin: 10px 0;
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
  }
  .msg-actions {
    display: flex;
    gap: 4px;
    margin-top: 10px;
    opacity: 0;
    transition: opacity .15s;
  }
  .msg:hover .msg-actions { opacity: 1; }
  .msg-action {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    background: transparent;
    border: 1px solid transparent;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
  }
  .msg-action:hover { background: rgba(255,255,255,0.06); color: #fff; }
  .msg-action svg { width: 14px; height: 14px; }
  .msg-action.copied { color: #39d353; }

  /* Typing indicator */
  .typing {
    display: flex;
    align-items: center;
    gap: 5px;
    padding-top: 8px;
  }
  .typing-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--muted);
    animation: blink 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  /* ─── COMPOSER ─── */
  .composer-wrap {
    padding: 12px 24px 18px;
    position: relative;
    z-index: 2;
    background: linear-gradient(to top, var(--black) 70%, transparent);
  }
  .composer {
    max-width: 780px;
    margin: 0 auto;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 4px;
    transition: border-color .2s;
    position: relative;
  }
  .composer:focus-within { border-color: rgba(0,180,255,0.4); }
  .composer.rainbow-on::before {
    content: '';
    position: absolute;
    inset: -1.5px;
    border-radius: 19.5px;
    background: var(--rainbow);
    background-size: 200%;
    animation: shift 4s linear infinite;
    z-index: -1;
    opacity: 0.6;
  }
  .composer-input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-size: 15px;
    font-family: 'Barlow', sans-serif;
    line-height: 1.55;
    padding: 12px 14px 8px;
    resize: none;
    max-height: 220px;
    min-height: 24px;
  }
  .composer-input::placeholder { color: var(--muted2); }
  .composer-toolbar {
    display: flex;
    align-items: center;
    padding: 4px 8px 8px 8px;
    gap: 4px;
  }
  .composer-btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
  }
  .composer-btn:hover { background: rgba(255,255,255,0.06); color: #fff; }
  .composer-btn svg { width: 16px; height: 16px; }
  .composer-tool-label {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px 5px 8px;
    border-radius: 8px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 12.5px;
    transition: all .15s;
    font-family: 'Barlow', sans-serif;
  }
  .composer-tool-label:hover { background: rgba(255,255,255,0.05); color: #fff; }
  .composer-tool-label.active { background: rgba(0,180,255,0.1); color: #00b4ff; border-color: rgba(0,180,255,0.25); }
  .composer-tool-label svg { width: 14px; height: 14px; }

  .composer-toolbar-right { margin-left: auto; display: flex; gap: 6px; align-items: center; }
  .composer-count {
    font-size: 11px;
    color: var(--muted2);
    margin-right: 4px;
  }
  .send-btn {
    width: 34px;
    height: 34px;
    border-radius: 9px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.4);
    transition: all .2s;
  }
  .send-btn.active {
    background: var(--rainbow);
    background-size: 200%;
    animation: shift 4s linear infinite;
    color: #000;
  }
  .send-btn.active:hover { transform: scale(1.05); }
  .send-btn svg { width: 16px; height: 16px; }

  .composer-hint {
    text-align: center;
    font-size: 11.5px;
    color: var(--muted2);
    padding-top: 10px;
    letter-spacing: 0.3px;
  }
  .composer-hint kbd {
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    color: rgba(255,255,255,0.7);
  }

  /* ─── MOBILE ─── */
  .mobile-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 999;
  }
  .mobile-overlay.show { display: block; }

  @media (max-width: 820px) {
    .app { grid-template-columns: 1fr; }
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 280px;
      z-index: 1000;
      transform: translateX(-100%);
      transition: transform .25s;
    }
    .sidebar.open { transform: translateX(0); }
    .app.collapsed { grid-template-columns: 1fr; }
    .app.collapsed .sidebar { transform: translateX(-100%); }
    .mobile-menu-btn { display: flex !important; }
    .suggestions { grid-template-columns: 1fr; }
    .chat-inner { padding: 24px 16px 16px; }
    .composer-wrap { padding: 12px 16px 14px; }
  }
  .mobile-menu-btn { display: none; }
</style>
</head>
<body>

<div class="mobile-overlay" id="mobileOverlay" onclick="closeMobileSidebar()"></div>

<div class="app" id="app">

  <!-- ─── SIDEBAR ─── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <a href="#" class="logo">
        <div class="logo-box"><span>LS</span></div>
        <span class="logo-text">LEAMSOFT</span>
      </a>
      <button class="sidebar-toggle" onclick="toggleSidebar()" title="Collapse sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3v18M3 6h6M3 12h6M3 18h6"/></svg>
      </button>
    </div>

    <div class="new-chat-wrap">
      <button class="new-chat-btn" onclick="newChat()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        <span>New chat</span>
      </button>
    </div>

    <div class="sidebar-search">
      <input type="text" class="search-input" placeholder="Search chats…" id="searchInput" oninput="filterChats(this.value)">
    </div>

    <div class="chat-list" id="chatList">
      <!-- populated by JS -->
    </div>

    <div class="sidebar-bottom">
      <div class="user-box">
        <div class="user-avatar">AD</div>
        <div class="user-info">
          <div class="user-name">Aditya</div>
          <div class="user-plan">Pro Plan</div>
        </div>
        <div class="user-info-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
        </div>
      </div>
    </div>
  </aside>

  <!-- ─── MAIN ─── -->
  <main class="main">
    <div class="main-bg"></div>

    <div class="topbar">
      <button class="topbar-btn mobile-menu-btn" onclick="openMobileSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>

      <button class="model-selector">
        <span class="model-dot"></span>
        <span>LEAM 4.7 Opus</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </button>

      <div class="topbar-spacer"></div>

      <button class="topbar-share" title="Share chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><path d="M16 6l-4-4-4 4"/><path d="M12 2v13"/></svg>
        Share
      </button>
      <button class="topbar-btn" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      </button>
    </div>

    <div class="chat-area" id="chatArea">
      <div class="chat-inner" id="chatInner">
        <!-- populated by JS -->
      </div>
    </div>

    <div class="composer-wrap">
      <div class="composer" id="composer">
        <textarea class="composer-input" id="composerInput" placeholder="Message LEAMSOFT…" rows="1"></textarea>
        <div class="composer-toolbar">
          <button class="composer-btn" title="Attach file">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <button class="composer-tool-label" onclick="toggleTool(this)" title="Web search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 010 18M12 3a14 14 0 000 18"/></svg>
            Search
          </button>
          <button class="composer-tool-label" onclick="toggleTool(this)" title="Research">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
            Research
          </button>

          <div class="composer-toolbar-right">
            <span class="composer-count" id="charCount"></span>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
            </button>
          </div>
        </div>
      </div>
      <div class="composer-hint">
        LEAMSOFT may produce inaccurate information. Press <kbd>Enter</kbd> to send, <kbd>Shift+Enter</kbd> for new line.
      </div>
    </div>

  </main>

</div>

<script>
  /* ─── STATE ─── */
  const seedChats = [
    {
      id: 'c1',
      title: 'React vs Vue for new project',
      group: 'Today',
      messages: [
        { role: 'user', text: 'I\'m starting a new dashboard project. Should I pick React or Vue in 2026?' },
        { role: 'assistant', text: 'Both are great choices in 2026. Here\'s a quick breakdown:\n\n• React: Larger ecosystem, more job market demand, server components are mature now.\n• Vue: Simpler learning curve, better DX out of the box, Composition API is fantastic.\n\nIf your team already knows one, stick with it. For a brand-new dashboard with no constraints, I\'d lean React for the ecosystem depth — especially if you need things like TanStack Table or shadcn/ui.' }
      ]
    },
    {
      id: 'c2',
      title: 'Optimize PostgreSQL query',
      group: 'Today',
      messages: [
        { role: 'user', text: 'My query takes 4 seconds. How do I speed it up?' },
        { role: 'assistant', text: 'Without seeing the query, the usual culprits are:\n\n1. Missing indexes on filtered/joined columns\n2. Sequential scans on large tables\n3. N+1 patterns from ORM\n4. Stale statistics\n\nRun `EXPLAIN ANALYZE` on the query and share the output — I can pinpoint exactly what to fix.' }
      ]
    },
    { id: 'c3', title: 'Tailwind dark mode setup', group: 'Yesterday', messages: [] },
    { id: 'c4', title: 'REST vs GraphQL tradeoffs', group: 'Yesterday', messages: [] },
    { id: 'c5', title: 'Brainstorm: marketing campaign for Q3', group: 'Previous 7 days', messages: [] },
    { id: 'c6', title: 'Docker compose health checks', group: 'Previous 7 days', messages: [] },
    { id: 'c7', title: 'Explain WebAssembly to me', group: 'Previous 7 days', messages: [] },
    { id: 'c8', title: 'Resume bullet rewrite', group: 'Previous 30 days', messages: [] },
    { id: 'c9', title: 'Vacation itinerary for Japan', group: 'Previous 30 days', messages: [] }
  ];

  const cannedReplies = [
    "That's a great question. Let me break it down:\n\nThere are a few angles worth considering — the technical complexity, the timeline you're working with, and the team's familiarity with the stack. Each one shifts the answer slightly.\n\nWhich of those matters most to you right now? I can dig deeper into the one that's most relevant.",
    "Here's a quick take:\n\n• The simplest approach is usually best if you're prototyping\n• If this is production-bound, invest in proper error handling and observability from day one\n• Don't over-engineer — you can always add complexity later\n\nWant me to sketch out a specific implementation?",
    "Good thinking. The short answer is: it depends on your constraints.\n\nIf you're optimizing for speed of delivery, go with the off-the-shelf solution. If you need long-term flexibility and your team has the bandwidth, building it custom usually pays off in year two.\n\nWhat's your timeline looking like?",
    "Let me think through this with you.\n\nThe pattern you're describing is pretty common — most teams hit it once they scale past a handful of services. The standard fixes are:\n\n1. Introduce a message queue (RabbitMQ, SQS, etc.)\n2. Adopt event-driven architecture\n3. Decouple via API gateways\n\nThe right pick depends on your latency tolerance. Got numbers I can work with?",
    "Sure thing! Here's a concise example:\n\n```js\nasync function fetchUser(id) {\n  const res = await fetch(`/api/users/${id}`);\n  if (!res.ok) throw new Error('User not found');\n  return res.json();\n}\n```\n\nThis handles the basic case. For production you'd want retries, timeouts, and proper error boundaries on the consumer side. Want me to extend it?"
  ];

  let state = {
    chats: JSON.parse(JSON.stringify(seedChats)),
    activeId: 'c1',
    typing: false
  };

  /* ─── DOM ─── */
  const chatListEl = document.getElementById('chatList');
  const chatInnerEl = document.getElementById('chatInner');
  const chatAreaEl = document.getElementById('chatArea');
  const composerInput = document.getElementById('composerInput');
  const sendBtn = document.getElementById('sendBtn');
  const composerEl = document.getElementById('composer');
  const charCountEl = document.getElementById('charCount');
  const appEl = document.getElementById('app');
  const sidebarEl = document.getElementById('sidebar');
  const mobileOverlayEl = document.getElementById('mobileOverlay');

  /* ─── RENDER SIDEBAR ─── */
  function renderSidebar(filter = '') {
    const f = filter.trim().toLowerCase();
    const visible = state.chats.filter(c => !f || c.title.toLowerCase().includes(f));

    const groups = {};
    visible.forEach(c => {
      if (!groups[c.group]) groups[c.group] = [];
      groups[c.group].push(c);
    });

    chatListEl.innerHTML = '';
    Object.entries(groups).forEach(([groupName, chats]) => {
      const label = document.createElement('div');
      label.className = 'chat-group-label';
      label.textContent = groupName;
      chatListEl.appendChild(label);

      chats.forEach(c => {
        const item = document.createElement('a');
        item.href = '#';
        item.className = 'chat-item' + (c.id === state.activeId ? ' active' : '');
        item.innerHTML = `
          <span class="chat-item-title">${escapeHtml(c.title)}</span>
          <button class="chat-item-menu" title="More" onclick="event.preventDefault(); event.stopPropagation(); deleteChat('${c.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
          </button>
        `;
        item.onclick = (e) => { e.preventDefault(); selectChat(c.id); };
        chatListEl.appendChild(item);
      });
    });

    if (visible.length === 0) {
      chatListEl.innerHTML = '<div style="text-align:center; padding:30px 12px; font-size:13px; color:var(--muted2);">No chats found</div>';
    }
  }

  /* ─── RENDER MESSAGES ─── */
  function renderMessages() {
    const chat = state.chats.find(c => c.id === state.activeId);
    if (!chat) return;

    if (chat.messages.length === 0) {
      chatInnerEl.innerHTML = `
        <div class="welcome">
          <div class="welcome-icon"><span>⚡</span></div>
          <h1>How can I help you today<span class="rainbow-text">?</span></h1>
          <p>Ask anything — code, ideas, strategy, or just to brainstorm. Pick a starter below or type your own.</p>
          <div class="suggestions">
            <button class="suggestion" onclick="usePrompt('Help me design a REST API for a notes app with users, tags and sharing')">
              <div class="suggestion-icon" style="background:rgba(0,180,255,0.12); color:#00b4ff;">🔌</div>
              <div class="suggestion-text">
                <div class="suggestion-title">Design a REST API</div>
                <div class="suggestion-sub">For a notes app with sharing</div>
              </div>
            </button>
            <button class="suggestion" onclick="usePrompt('Write a friendly email pitching our new product launch')">
              <div class="suggestion-icon" style="background:rgba(168,85,247,0.12); color:#a855f7;">✉️</div>
              <div class="suggestion-text">
                <div class="suggestion-title">Draft a marketing email</div>
                <div class="suggestion-sub">For a new product launch</div>
              </div>
            </button>
            <button class="suggestion" onclick="usePrompt('Explain how WebAssembly works in simple terms')">
              <div class="suggestion-icon" style="background:rgba(57,211,83,0.12); color:#39d353;">💡</div>
              <div class="suggestion-text">
                <div class="suggestion-title">Explain a concept</div>
                <div class="suggestion-sub">Like WebAssembly, simply</div>
              </div>
            </button>
            <button class="suggestion" onclick="usePrompt('Plan a 7-day Japan trip itinerary focused on food and culture')">
              <div class="suggestion-icon" style="background:rgba(255,140,0,0.12); color:#ff8c00;">🗾</div>
              <div class="suggestion-text">
                <div class="suggestion-title">Plan a trip</div>
                <div class="suggestion-sub">7 days in Japan</div>
              </div>
            </button>
          </div>
        </div>
      `;
      return;
    }

    chatInnerEl.innerHTML = '<div class="messages" id="messages"></div>';
    const messagesEl = document.getElementById('messages');

    chat.messages.forEach((m, idx) => {
      const div = document.createElement('div');
      div.className = 'msg ' + m.role;
      const avatar = m.role === 'user'
        ? '<div class="msg-avatar">AD</div>'
        : '<div class="msg-avatar"><span>LS</span></div>';
      const name = m.role === 'user' ? 'You' : 'LEAMSOFT';
      div.innerHTML = `
        ${avatar}
        <div class="msg-body">
          <div class="msg-name">${name}</div>
          <div class="msg-bubble">${formatBody(m.text)}</div>
          ${m.role === 'assistant' ? `
          <div class="msg-actions">
            <button class="msg-action" title="Copy" onclick="copyText(this, ${idx})">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            </button>
            <button class="msg-action" title="Good response">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 00-6 0v4H5a2 2 0 00-2 2v9a2 2 0 002 2h12.28a2 2 0 002-1.7l1.38-9A2 2 0 0018.66 9H14z"/></svg>
            </button>
            <button class="msg-action" title="Bad response">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 15v4a3 3 0 006 0v-4h3a2 2 0 002-2v-9a2 2 0 00-2-2H6.72a2 2 0 00-2 1.7L3.34 13A2 2 0 005.34 15H10z"/></svg>
            </button>
            <button class="msg-action" title="Regenerate">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0115-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 01-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>
            </button>
          </div>` : ''}
        </div>
      `;
      messagesEl.appendChild(div);
    });

    if (state.typing) {
      const div = document.createElement('div');
      div.className = 'msg assistant';
      div.id = 'typingMsg';
      div.innerHTML = `
        <div class="msg-avatar"><span>LS</span></div>
        <div class="msg-body">
          <div class="msg-name">LEAMSOFT</div>
          <div class="typing">
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
          </div>
        </div>
      `;
      messagesEl.appendChild(div);
    }

    scrollToBottom();
  }

  function scrollToBottom() {
    requestAnimationFrame(() => {
      chatAreaEl.scrollTo({ top: chatAreaEl.scrollHeight, behavior: 'smooth' });
    });
  }

  /* ─── HELPERS ─── */
  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
  }
  function formatBody(text) {
    let safe = escapeHtml(text);
    safe = safe.replace(/```([\s\S]*?)```/g, (_, code) => `<pre>${code.trim()}</pre>`);
    safe = safe.replace(/`([^`]+)`/g, '<code>$1</code>');
    safe = safe.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    return safe;
  }

  /* ─── ACTIONS ─── */
  function selectChat(id) {
    state.activeId = id;
    state.typing = false;
    renderSidebar(document.getElementById('searchInput').value);
    renderMessages();
    closeMobileSidebar();
  }

  function newChat() {
    const id = 'c' + Date.now();
    state.chats.unshift({ id, title: 'New chat', group: 'Today', messages: [] });
    state.activeId = id;
    state.typing = false;
    renderSidebar();
    renderMessages();
    composerInput.focus();
    closeMobileSidebar();
  }

  function deleteChat(id) {
    state.chats = state.chats.filter(c => c.id !== id);
    if (state.activeId === id) {
      state.activeId = state.chats[0]?.id || null;
      if (!state.activeId) newChat();
    }
    renderSidebar();
    renderMessages();
  }

  function filterChats(v) {
    renderSidebar(v);
  }

  function usePrompt(text) {
    composerInput.value = text;
    autoResize();
    updateSendBtn();
    composerInput.focus();
  }

  function sendMessage() {
    const text = composerInput.value.trim();
    if (!text || state.typing) return;

    const chat = state.chats.find(c => c.id === state.activeId);
    if (!chat) return;

    chat.messages.push({ role: 'user', text });
    if (chat.title === 'New chat') chat.title = text.slice(0, 40) + (text.length > 40 ? '…' : '');

    composerInput.value = '';
    autoResize();
    updateSendBtn();
    state.typing = true;
    renderSidebar(document.getElementById('searchInput').value);
    renderMessages();

    const delay = 700 + Math.random() * 800;
    setTimeout(() => {
      const reply = cannedReplies[Math.floor(Math.random() * cannedReplies.length)];
      chat.messages.push({ role: 'assistant', text: reply });
      state.typing = false;
      renderMessages();
    }, delay);
  }

  function copyText(btn, idx) {
    const chat = state.chats.find(c => c.id === state.activeId);
    const text = chat.messages[idx].text;
    navigator.clipboard.writeText(text).then(() => {
      btn.classList.add('copied');
      const original = btn.innerHTML;
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = original;
      }, 1400);
    });
  }

  function toggleTool(btn) {
    btn.classList.toggle('active');
    composerEl.classList.toggle('rainbow-on', !!document.querySelector('.composer-tool-label.active'));
  }

  function toggleSidebar() {
    appEl.classList.toggle('collapsed');
  }
  function openMobileSidebar() {
    sidebarEl.classList.add('open');
    mobileOverlayEl.classList.add('show');
  }
  function closeMobileSidebar() {
    sidebarEl.classList.remove('open');
    mobileOverlayEl.classList.remove('show');
  }

  /* ─── COMPOSER ─── */
  function autoResize() {
    composerInput.style.height = 'auto';
    composerInput.style.height = Math.min(composerInput.scrollHeight, 220) + 'px';
  }
  function updateSendBtn() {
    const hasText = composerInput.value.trim().length > 0;
    sendBtn.classList.toggle('active', hasText);
    const len = composerInput.value.length;
    charCountEl.textContent = len > 0 ? `${len}` : '';
  }
  composerInput.addEventListener('input', () => {
    autoResize();
    updateSendBtn();
  });
  composerInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  /* ─── INIT ─── */
  renderSidebar();
  renderMessages();
  updateSendBtn();
  composerInput.focus();
</script>

</body>
</html>
